<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Vancouver Daycare Search</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; line-height: 1.6; color: #24292f; max-width: 900px; margin: 0 auto; padding: 16px; background: #f6f8fa; }
        #content { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 24px 32px; }
        h1 { font-size: 1.8em; border-bottom: 1px solid #d0d7de; padding-bottom: 8px; margin-bottom: 16px; }
        h2 { font-size: 1.4em; margin-top: 24px; border-bottom: 1px solid #d0d7de; padding-bottom: 6px; margin-bottom: 12px; }
        h3, h4 { font-size: 1.1em; margin-top: 16px; margin-bottom: 4px; }
        p, li { margin-bottom: 6px; }
        table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.9em; }
        th, td { border: 1px solid #d0d7de; padding: 6px 12px; text-align: left; }
        th { background: #f6f8fa; font-weight: 600; }
        a { color: #0969da; text-decoration: none; }
        a:hover { text-decoration: underline; }
        strong { color: #1a7f37; }
        em { color: #9a6700; }
        hr { border: none; border-top: 1px solid #d0d7de; margin: 16px 0; }
        code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
        input[type="checkbox"] { margin-right: 6px; }
        .loading { text-align: center; padding: 40px; color: #656d76; }
        @media (max-width: 600px) { body { padding: 8px; } #content { padding: 16px; } }
    </style>
</head>
<body>
    <div id="content"><div class="loading">Loading daycare search results...</div></div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const MD_URL = 'https://raw.githubusercontent.com/jasonesanders/daycare/main/Daycare%20Search%20Results.md';
        fetch(MD_URL)
            .then(r => r.text())
            .then(md => {
                // Strip YAML frontmatter
                md = md.replace(/^---[\s\S]*?---\n/, '');
                // Convert checkbox syntax
                md = md.replace(/- \[ \]/g, '<input type="checkbox">');
                md = md.replace(/- \[x\]/g, '<input type="checkbox" checked>');
                document.getElementById('content').innerHTML = marked.parse(md);
            })
            .catch(e => {
                document.getElementById('content').innerHTML = '<p>Error loading results. <a href="' + MD_URL + '">View raw file</a></p>';
            });
    </script>
</body>
</html>
